<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>FoodParadise | Signup</title>
        <style>
            *{box-sizing: border-box;}
            body {
                position: relative;
                width: 100%;
                height: 100vh;
                margin: 0;
                background: url('pedalboard.jpg');
                background-size: cover;
            }
            #transparency-mask{
                position: absolute;
                top: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(#2e2e2e, transparent);
                backdrop-filter: blur(2px);
            }
            form{
                width: calc(40% + 1rem);
                position: relative;
                display: flex;
                flex-direction: column;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                background-color: #eee;
                padding: 1rem;
                margin: 0;
                border-radius: 1rem;
                box-shadow: 0 0 1rem #666;
                opacity: 1;
                animation: opacity 0.6s;
            }
            h1{text-align: center;}
            .container{width: 80%; margin: auto;}
            .block{
                margin: 0.5rem 0rem;
                padding: 0.25rem;
                display: flex;
                justify-content: space-between;
                width: 100%;
                align-items: center;
            }
            label{width: 50%}
            input, select{
                padding: 0.5rem;
                outline: none;
                border: none;
                border-bottom: 1px solid #000;
                background-color: transparent;
                width: 50%;
            }
            select {
                font-size: small;
                color: white;
                padding: 0.5em 1em 0.4em 0.7em;
                box-sizing: border-box;
                margin: 0.2rem;
                outline: none;
                box-shadow: 0 1px 0 1px rgba(0, 0, 0, 0.04);
                border-radius: 0.5em;
                background: linear-gradient(#222, #444);
                background-repeat: repeat;
                background-position: right 0.7em top 50%, 0 0;
                background-size: 0.65em auto, 100%;
            }
            option{
                padding: 4px;
                outline: 0;
                border-top: 1px solid #777;
                background-color: #444;
            }
            button, .block> a{
                display: inline-block;
                text-decoration: none;
                padding: 1rem;
                width: 50%;
                color: white;
                background-color: maroon;
                border: none;
                cursor: pointer;
                text-align: center;
                border-radius: 1rem;
                margin: 0 1rem;
            }
            #signin{
                background-color: transparent;
                color: #000;
            }
            button, .block>a:hover, #signin:hover{
                background-color: red;
                transition-duration: .3s;
                color: white;
            }
            
            @keyframes opacity {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <div id="transparency-mask"></div>
        <form method="POST" action="/auth" th:action="|/auth?destination=${destination}&type=siginup|">
            <h1>Welcome to FoodParadise</h1>
            <div class="container">
                <div class="block">
                    <label for="username">Username:</label>
                    <input type="text" name="username" id="username">
                </div>
                <div class="block">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="block">
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password">
                </div>
                <div class="block">
                    <label for="uage">Age Group</label>
                    <select id="uage" name="userage">
                        <option>Below 20</option>
                        <option selected>20 - 30</option>
                        <option>30 - 40</option>
                        <option>40 - 50</option>
                        <option>50 - 60</option>
                        <option>Above 60</option>
                    </select>
                </div>
            </div>
            <div class="block">
                <button type="submit"> Sign up </button>
                <a href="/signin" id="signin">Sign in</a>
            </div>
            <p style="font-size: small;">By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
        </form>
    </body>
</html>
