<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>FoodParadise</title>
        <style>
            :root {
                --std-margin: 1rem;
            }
            *{box-sizing: border-box;}
            body {
                position: relative;
                margin: 0;
            }
            header{
                display: flex;
                position: absolute;
                backdrop-filter: blur(4px);
                justify-content: space-between;
                width: calc(100% - var(--std-margin) * 2);
                padding: 1rem;
                margin: var(--std-margin);
                border-radius: 1rem;
            }
            nav {
                min-width: 20rem;
                width: 60%;
                max-width: 80%;
            }
            nav>ul {
                display: flex;
                list-style: none;
                justify-content: space-around;
                padding: 0;
            }
            main {
                background: linear-gradient(45deg, green, #29ee00);
            }
            .empty-space {
                width: 100%;
                height: 8rem;
            }
            .hero{
                text-align: center;
            }
            h1 {
                margin-top: 0;
            }

        </style>
    </head>
    <body>
        <header>
            <p>FoodParadise</p>
            <nav>
                <ul>
                    <li><a href="/about">About</a></li>
                    <li><a href="/signin?to=dashboard&source=https://localhost:8080/">Signin</a></li>
                    <li><a href="/signup?to=dashboard&source=https://localhost:8080/">Get Started for Free</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="hero">
                <div class="empty-space"></div>
                <h1>Well Made Food With Love</h1>
                <h2>Nigeria's first digital restaurant</h2>
            </div>
        </main>
    </body>
</html>
