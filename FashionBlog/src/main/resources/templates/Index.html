<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Couture Corner | Fashion Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-white text-gray-900">

<nav class="border-b py-6 px-10 flex justify-between items-center uppercase tracking-widest text-sm">
    <a href="/" class="text-2xl font-bold italic">Couture Corner</a>
    <div class="space-x-8">
        <a href="#" class="hover:text-gray-500">Editorial</a>
        <a href="#" class="hover:text-gray-500">Streetwear</a>
        <a href="#" class="hover:text-gray-500">About</a>
    </div>
</nav>

<header class="py-16 text-center">
    <h2 class="text-5xl mb-4">Style, Defined.</h2>
    <p class="text-gray-500 italic">Curated stories from the world of high fashion.</p>
</header>

<main class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12">
    <a th:href="@{/post/{id}(id=${post.id})}" th:each="post : ${posts}" class="group cursor-pointer">
        <div class="overflow-hidden mb-4">
            <img th:src="${post.imageUrl}" class="w-full h-80 object-cover transition-transform duration-500 group-hover:scale-105" alt="Fashion Image">
        </div>
        <p class="text-xs uppercase tracking-widest text-gray-400 mb-2" th:text="${post.category}">Category</p>
        <h3 class="text-2xl mb-3 leading-tight group-hover:underline" th:text="${post.title}">
            Post Title
        </h3>
        <p class="text-gray-600 text-sm leading-relaxed" th:text="${post.summary}">Short summary goes here...</p>
    </a>
</main>

<footer class="border-t mt-20 py-10 text-center text-xs text-gray-400 uppercase tracking-widest">
    &copy; 2026 Couture Corner. All Rights Reserved.
</footer>

</body>
</html>
