<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title th:text="|${post.title} Post|">Post Title</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
        <style>
            body { font-family: 'Inter', sans-serif; }
            h1, h2 { font-family: 'Playfair Display', serif; }
        </style>
    </head>
    <body class="bg-gray-50 font-sans leading-normal tracking-normal">

    <div class="relative h-[50vh] min-h-[400px] w-full">
        <img th:src="${post.imageUrl}"
             class="absolute inset-0 w-full h-full object-cover"
             alt="Cover Image">
        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/40"></div>

        <div class="relative max-w-4xl mx-auto h-full flex flex-col justify-end pb-12 px-4">
                <span th:text="${post.category}"
                      class="bg-blue-600 text-white text-xs font-bold uppercase tracking-wider px-3 py-1 rounded-full w-fit mb-4">
                    Category
                </span>
            <h1 th:text="${post.title}"
                class="text-4xl md:text-6xl font-extrabold text-white mb-4">
                The Beauty of Java 8
            </h1>
            <div class="flex items-center text-gray-300 text-sm">
                <span class="font-semibold text-white" th:text="${post.author}">Author Name</span>
                <span class="mx-2">•</span>
                <span th:text="${formattedDate}">January 01, 2026</span>
            </div>
            <div class="flex items-center p-4 mb-8 bg-white/30 backdrop-blur-md border border-white/20 rounded-xl shadow-sm">
                <img th:src="${post.imageUrl}" class="w-12 h-12 rounded-full object-cover border-2 border-blue-500" />
                <div class="ml-4">
                    <p class="text-sm font-bold text-gray-900" th:text="${post.author}">Author Name</p>
                    <p class="text-xs text-gray-500">Published in <span th:text="${post.category}" class="text-blue-600">Category</span></p>
                </div>
            </div>
        </div>
    </div>

    <article class="max-w-4xl mx-auto bg-white -mt-10 mb-20 rounded-lg shadow-xl overflow-hidden relative z-10">
        <div class="p-8 md:p-16">
            <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed"
                 th:utext="${post.content}">
                Post content goes here...
            </div>
        </div>

        <div class="border-t border-gray-100 p-8 bg-gray-50 flex justify-between items-center">
            <div class="flex space-x-4">
                <button class="text-gray-400 hover:text-blue-500 transition">Share to Twitter</button>
                <button class="text-gray-400 hover:text-blue-700 transition">Share to LinkedIn</button>
            </div>
            <a href="/" class="text-blue-600 font-semibold hover:underline">← Back to Feed</a>
        </div>
    </article>

    </body>
</html>
